name: Daily Data Ingestion

on:
  schedule:
    # 10:30 UTC = 17:30 Bangkok — runs after SET closes (16:30 ICT)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Prices (SET50 + global via yfinance)
        run: python ingestion/prices.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Fundamentals (Graham metrics via FMP)
        run: python ingestion/fundamentals.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

      - name: Macro (FRED + World Bank)
        run: python ingestion/macro.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
